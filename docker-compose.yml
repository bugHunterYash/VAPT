version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: vmt_db
    environment:
      POSTGRES_USER: vmt_user
      POSTGRES_PASSWORD: vmt_password
      POSTGRES_DB: vmt_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  minio:
    image: minio/minio
    container_name: vmt_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: always

volumes:
  postgres_data:
  minio_data:
